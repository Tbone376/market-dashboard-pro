name: Add refresh button to dashboard

on:
  push:
    paths:
      - '.github/workflows/add-refresh-btn.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch refresh button into index.html
        run: |
          python3 scripts/patch_refresh.py
          SIZE=$(wc -c < index.html)
          echo "Patched index.html: $SIZE bytes"
          grep -c 'refreshBtn' index.html && echo 'Refresh button confirmed' || (echo 'PATCH FAILED' && exit 1)

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes needed" || (git commit -m "feat: add refresh button to dashboard header" && git push)
