name: Pre-Market Briefing

on:
  schedule:
    # 12:00 UTC = 7:00 AM ET (EST) / 8:00 AM ET (EDT)
    # Runs Monday-Friday only
    - cron: '0 12 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytz

      - name: Generate briefing
        run: python scripts/generate_briefing.py

      - name: Commit and push briefing.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/briefing.json
          DATESTR=$(TZ='America/New_York' date '+%a, %b %-d, %Y')
          git diff --cached --quiet || git commit -m "data: update briefing.json ${DATESTR}"
          git pull --rebase origin main
          git push
