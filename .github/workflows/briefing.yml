name: Pre-Market Briefing

on:
  schedule:
    # 12:00 UTC = 7:00 AM ET (EST) / 8:00 AM ET (EDT)
    # Runs Monday-Friday only
    - cron: '0 12 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install yfinance pytz

      - name: Check if trading day
        id: check_day
        run: |
          python -c "
          import pytz
          from datetime import datetime
          et = pytz.timezone('America/New_York')
          now = datetime.now(et)
          holidays = [
            '2026-01-01','2026-01-19','2026-02-16','2026-04-03',
            '2026-05-25','2026-06-19','2026-07-03','2026-09-07',
            '2026-11-26','2026-12-25',
          ]
          today = now.strftime('%Y-%m-%d')
          if now.weekday() >= 5 or today in holidays:
            print('trading_day=false')
          else:
            print('trading_day=true')
          " >> $GITHUB_OUTPUT

      - name: Generate briefing
        if: steps.check_day.outputs.trading_day == 'true'
        run: |
          python scripts/generate_briefing.py

      - name: Commit and push briefing.json
        if: steps.check_day.outputs.trading_day == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/briefing.json
          DATESTR=$(TZ='America/New_York' date '+%a, %b %-d, %Y')
          git diff --cached --quiet || git commit -m "data: update briefing.json ${DATESTR}"
          git push
