name: Apply Briefing Section

on:
  push:
    paths:
      - 'apply_briefing.py'

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Apply briefing section to index.html
        run: python3 apply_briefing.py

      - name: Commit updated index.html and cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm apply_briefing.py
          git rm briefing_patches.json
          git add index.html
          git commit -m "feat: add Pre-Market Briefing section (Section 00) + data/briefing.json [skip ci]"
          git push
