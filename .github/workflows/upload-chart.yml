name: Upload SMCI Chart

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/upload-chart.yml'

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download SMCI chart
        run: |
          mkdir -p charts
          curl -L -o charts/smci_annotated_oct2023_apr2024.png "https://files.catbox.moe/jrkc1o.png"
          ls -la charts/smci_annotated_oct2023_apr2024.png
          file charts/smci_annotated_oct2023_apr2024.png

      - name: Commit and push chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/smci_annotated_oct2023_apr2024.png
          git diff --staged --quiet || git commit -m "Add SMCI annotated chart (Oct 2023 - Apr 2024)"
          git pull --rebase origin main
          git push
