name: Restore index.html v2

on:
  push:
    paths:
      - '.github/workflows/restore-index-v2.yml'
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download full index.html from known good commit
        run: |
          curl -sL "https://raw.githubusercontent.com/Tbone376/market-dashboard-pro/91f7fa03628a33aa52d22ffb0cf36f3829e3b175/index.html" -o index.html
          SIZE=$(wc -c < index.html)
          echo "Downloaded index.html: $SIZE bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "ERROR: File too small ($SIZE bytes), expected ~118KB"
            exit 1
          fi
          echo "File size looks correct"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes needed" || (git commit -m "fix: restore full index.html (was truncated to 510 bytes by chunked push)" && git push)
